<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <div class="nav-address border">
                <p class="add-first">Delivery to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-second">Bangladesh</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="nav-select">
                    <option>All</option>
                </select>
                <input type="text" placeholder="Search Amazon" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            <div class="nav-flag border">
                <i class="fa-solid fa-flag" style="color: rgb(65, 140, 43);"></i>
                <select class="flag-select">
                    <option>BAN</option>
                </select>
            </div>
            <div class="nav-text border">
                <p>Hello, sign in</p>
                <div class="nav-op">
                    <p>Account & List</p>
                    <select class="nv-select">
                    </select>
                </div>
            </div>
            <div class="nav-text border">
                <p>Returns</p>
                <div class="nav-op">
                    <p>& Order</p>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
